global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: buildathon-api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials: demo-employee-token
    static_configs:
      - targets:
          - backend:8000